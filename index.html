<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Movie Search</title>
    <style>
        :root {
            --bg: #111;
            --text: #eee;
            --accent: #ff8c00; /* Letterboxd-ish orange */
            --card: #222;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 20px; color: var(--accent); }
        .top-layout {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: minmax(180px, 1fr) minmax(320px, 600px) minmax(180px, 1fr);
            gap: 16px;
            align-items: start;
            position: sticky;
            top: 20px;
            z-index: 100;
        }
        .search-container {
            width: 100%;
            max-width: 600px;
        }
        .search-options {
            margin-top: 10px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: #bbb;
        }
        .search-options label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            background: #252525;
            border: 1px solid #3d3d3d;
            border-radius: 999px;
            padding: 8px 12px;
            transition: border-color 0.2s, background 0.2s;
        }
        .search-options label:hover {
            border-color: #5a5a5a;
            background: #2f2f2f;
        }
        .search-options input[type="radio"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 2px solid #444;
            background: #333;
            color: white;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        input:focus { border-color: var(--accent); }
        
        #status {
            margin-top: 10px;
            color: #888;
            font-size: 0.9rem;
        }

        #results {
            width: 100%;
            max-width: 800px;
            margin-top: 30px;
            display: grid;
            gap: 10px;
        }
        .keyword-panel {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .keyword-panel h2 {
            margin: 0 0 10px;
            font-size: 1rem;
            color: #ddd;
        }
        .keyword-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .keyword-button {
            border: 1px solid #444;
            background: #2d2d2d;
            color: #f1f1f1;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }
        .keyword-button:hover {
            background: #3a3a3a;
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        .keyword-button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .movie-card {
            background: var(--card);
            padding: 15px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, background 0.2s;
        }
        .movie-card:hover {
            transform: translateY(-2px);
            background: #2a2a2a;
            border-left: 4px solid var(--accent);
        }
        .title { font-weight: bold; font-size: 1.1rem; }
        .year { color: #888; margin-left: 10px; }
        .id { font-family: monospace; color: #555; font-size: 0.8rem; }
        
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 900px) {
            .top-layout {
                grid-template-columns: 1fr;
                position: static;
            }
            .search-container {
                order: 1;
            }
        }

    </style>
</head>
<body>

    <div id="loader" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 20px;">Loading database...</p>
    </div>

    <h1>Instant Movie Search</h1>

    <div class="top-layout">
        <aside class="keyword-panel" aria-label="Bernardo's keywords">
            <h2>Bernardo's keywords</h2>
            <div class="keyword-list" id="bernardoKeywords"></div>
        </aside>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Type to search (e.g. 'Silence')..." disabled>
            <div class="search-options">
                <label><input type="radio" name="searchMode" value="contains" checked> Contains</label>
                <label><input type="radio" name="searchMode" value="wholeWord"> Whole word only</label>
                <label><input type="radio" name="searchMode" value="compound"> Whole word + compounds</label>
            </div>
            <div id="status">Loading data...</div>
        </div>

        <aside class="keyword-panel" aria-label="Silvana's keywords">
            <h2>Silvana's keywords</h2>
            <div class="keyword-list" id="silvanaKeywords"></div>
        </aside>
    </div>

    <div id="results"></div>

    <script src="movies_data.js"></script>
    <script>
        const input = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        const statusDiv = document.getElementById('status');
        const loader = document.getElementById('loader');
        const modeInputs = document.querySelectorAll('input[name="searchMode"]');
        const bernardoKeywords = ['Summer', 'Time', 'End', 'King', 'City', 'Lady', 'Sun', 'Heart', 'Mountain', 'Mother', 'Island', 'Fire', 'Queen', 'Art', 'Hell'];
        const silvanaKeywords = ['Journey', 'Angel', 'Brother', 'Light', 'Sea', 'Voice', 'Land', 'Wife', 'Dog', 'Hour', 'Sky', 'Kid', 'Murder', 'Baby', 'God'];

        let movies = [];
        let currentMatches = [];
        let visibleCount = 0;
        let activeQuery = '';
        let activeMode = 'contains';
        const BATCH_SIZE = 100;

        window.onload = function() {
            if (window.allMovies) {
                movies = window.allMovies;
                loader.style.display = 'none';
                input.disabled = false;
                input.focus();
                statusDiv.textContent = `Loaded ${movies.length.toLocaleString()} movies. Ready to search.`;
            } else {
                statusDiv.textContent = "Error loading data. Make sure movies_data.js is in the same folder.";
            }
        };

        function renderKeywordButtons(containerId, keywords) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            keywords.forEach((keyword) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'keyword-button';
                button.dataset.keyword = keyword;
                button.textContent = keyword;
                container.appendChild(button);
            });
        }

        function searchByKeyword(keyword) {
            input.value = keyword;
            performSearch(keyword);
            input.focus();
        }

        renderKeywordButtons('bernardoKeywords', bernardoKeywords);
        renderKeywordButtons('silvanaKeywords', silvanaKeywords);

        function bindKeywordEvents(containerId) {
            const container = document.getElementById(containerId);
            container.addEventListener('click', (event) => {
                const target = event.target.closest('.keyword-button');
                if (!target) {
                    return;
                }
                searchByKeyword(target.dataset.keyword);
            });
            container.addEventListener('keydown', (event) => {
                const target = event.target.matches('.keyword-button')
                    ? event.target
                    : event.target.closest('.keyword-button');
                if (!target) {
                    return;
                }
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    searchByKeyword(target.dataset.keyword);
                }
            });
        }

        bindKeywordEvents('bernardoKeywords');
        bindKeywordEvents('silvanaKeywords');

        function escapeRegex(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // Irregular plurals mapping (singular <-> plural)
        const irregularPlurals = {
            'child': 'children', 'man': 'men', 'woman': 'women', 'person': 'people',
            'foot': 'feet', 'tooth': 'teeth', 'goose': 'geese', 'mouse': 'mice',
            'louse': 'lice', 'ox': 'oxen', 'die': 'dice', 'cactus': 'cacti',
            'focus': 'foci', 'fungus': 'fungi', 'nucleus': 'nuclei', 'syllabus': 'syllabi',
            'analysis': 'analyses', 'crisis': 'crises', 'thesis': 'theses',
            'phenomenon': 'phenomena', 'criterion': 'criteria', 'datum': 'data',
            'appendix': 'appendices', 'index': 'indices', 'matrix': 'matrices',
            'vertex': 'vertices', 'wife': 'wives', 'knife': 'knives', 'life': 'lives',
            'wolf': 'wolves', 'calf': 'calves', 'half': 'halves', 'leaf': 'leaves',
            'loaf': 'loaves', 'shelf': 'shelves', 'thief': 'thieves', 'self': 'selves',
            'elf': 'elves', 'dwarf': 'dwarves', 'scarf': 'scarves', 'city': 'cities',
            'baby': 'babies', 'lady': 'ladies', 'story': 'stories', 'army': 'armies',
            'sky': 'skies', 'fly': 'flies', 'spy': 'spies', 'body': 'bodies',
            'family': 'families', 'hero': 'heroes', 'potato': 'potatoes', 'tomato': 'tomatoes',
            'echo': 'echoes', 'torpedo': 'torpedoes', 'veto': 'vetoes', 'volcano': 'volcanoes',
            'fish': 'fish', 'sheep': 'sheep', 'deer': 'deer', 'species': 'species',
            'series': 'series', 'aircraft': 'aircraft', 'kid': 'kids'
        };

        // Build reverse mapping (plural -> singular)
        const pluralToSingular = {};
        for (const [singular, plural] of Object.entries(irregularPlurals)) {
            pluralToSingular[plural] = singular;
        }

        // Get all forms of a word (singular and plural)
        function getWordForms(word) {
            const lowerWord = word.toLowerCase();
            const forms = [lowerWord];
            
            // Check if it's a known singular
            if (irregularPlurals[lowerWord]) {
                forms.push(irregularPlurals[lowerWord]);
            }
            // Check if it's a known plural
            if (pluralToSingular[lowerWord]) {
                forms.push(pluralToSingular[lowerWord]);
            }
            
            return [...new Set(forms)];
        }

        const performSearch = (query) => {
            const normalizedQuery = query.trim();
            if (!normalizedQuery || normalizedQuery.length < 2) {
                resultsDiv.innerHTML = '';
                currentMatches = [];
                visibleCount = 0;
                activeQuery = '';
                statusDiv.textContent = `Loaded ${movies.length.toLocaleString()} movies. Ready to search.`;
                return;
            }

            const lowerQuery = normalizedQuery.toLowerCase();
            const matches = [];
            
            // Get all word forms (singular/plural) for whole word modes
            const wordForms = (activeMode === 'contains') ? [lowerQuery] : getWordForms(lowerQuery);
            
            // Build regex patterns for each word form
            const wholeWordRegexes = (activeMode === 'contains')
                ? null
                : wordForms.map(form => new RegExp(`(^|[^a-z0-9])${escapeRegex(form)}([^a-z0-9]|$)`, 'i'));
            const compoundRegexes = (activeMode === 'compound')
                ? wordForms.map(form => new RegExp(`(^|[^a-z0-9])${escapeRegex(form)}[a-z0-9]*`, 'i'))
                : null;

            for (let i = 0; i < movies.length; i++) {
                const lowerTitle = movies[i].title.toLowerCase();
                let isMatch = false;

                if (activeMode === 'contains') {
                    isMatch = lowerTitle.includes(lowerQuery);
                } else if (activeMode === 'wholeWord') {
                    isMatch = wholeWordRegexes.some(regex => regex.test(lowerTitle));
                } else {
                    isMatch = wholeWordRegexes.some(regex => regex.test(lowerTitle)) || 
                              compoundRegexes.some(regex => regex.test(lowerTitle));
                }

                if (isMatch) {
                    matches.push(movies[i]);
                }
            }

            currentMatches = matches;
            activeQuery = normalizedQuery;
            visibleCount = 0;
            displayNextBatch(true);
        };

        // Simple debounce
        let timeout;
        input.addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => performSearch(e.target.value), 300);
        });

        modeInputs.forEach(modeInput => {
            modeInput.addEventListener('change', () => {
                activeMode = document.querySelector('input[name="searchMode"]:checked').value;
                performSearch(input.value);
            });
        });

        function displayNextBatch(reset = false) {
            if (reset) {
                resultsDiv.innerHTML = '';
            }

            if (currentMatches.length === 0) {
                resultsDiv.innerHTML = '<div style="text-align:center; color:#666;">No matches found</div>';
                statusDiv.textContent = `0 matches for "${activeQuery}"`;
                return;
            }

            const nextBatch = currentMatches.slice(visibleCount, visibleCount + BATCH_SIZE);
            const html = nextBatch.map(m => `
                <a href="https://letterboxd.com/imdb/${m.id}" target="_blank" class="movie-card">
                    <div>
                        <span class="title">${highlight(m.title, activeQuery)}</span>
                        <span class="year">(${m.year || '?'})</span>
                    </div>
                    <div style="text-align: right;">
                         <span class="votes" style="display:block; font-size: 0.8rem; color: #666;">${m.votes ? m.votes.toLocaleString() + ' votes' : ''}</span>
                         <span class="id">LB ↗</span>
                    </div>
                </a>
            `).join('');

            resultsDiv.insertAdjacentHTML('beforeend', html);
            visibleCount += nextBatch.length;
            statusDiv.textContent = visibleCount < currentMatches.length
                ? `Showing ${visibleCount.toLocaleString()} of ${currentMatches.length.toLocaleString()} matches for "${activeQuery}". Scroll to load more.`
                : `Showing all ${currentMatches.length.toLocaleString()} matches for "${activeQuery}".`;
        }

        let scrollCheckScheduled = false;
        window.addEventListener('scroll', () => {
            if (scrollCheckScheduled) {
                return;
            }
            scrollCheckScheduled = true;
            requestAnimationFrame(() => {
                scrollCheckScheduled = false;
                if (!currentMatches.length || visibleCount >= currentMatches.length) {
                    return;
                }

                const scrollPosition = window.innerHeight + window.scrollY;
                const threshold = document.body.offsetHeight - 300;
                if (scrollPosition >= threshold) {
                    displayNextBatch();
                }
            });
        }, { passive: true });

        function highlight(text, query) {
            const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
            return text.replace(regex, '<span style="color:var(--accent);">$1</span>');
        }

    </script>
</body>
</html>
